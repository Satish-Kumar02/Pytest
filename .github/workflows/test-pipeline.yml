name: Test Automation Pipeline

on: 
    push:
        branches-ignore: 
          - main
        paths-ignore:
          - '**.md'
    pull_request: 
        branches: 
          - main 
            
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest

        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY}}
          AWS_DEFAULT_REGION: ap-south-2

        steps:
        - name: checkout code
          uses: actions/checkout@v4

        - name: set up python
          uses: actions/setup-python@v5
        
          with:
            python-version: '3.12'
        - name: Cache Allure
          uses: actions/cache@v4
          with:
            path: /opt/allure
            key: allure-2.24.0
        - name: Upgrade PIP
          run: python -m pip install --upgrade pip

        - name: Install dependencies
          run: python -m pip install -r requirements.txt
        - name: Install pytest xdist
          run: python -m pip install pytest-xdist
        - name: Install Allure CLI
          run: |
            sudo apt-get update
            sudo apt-get install -y default-jre
            wget https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.24.0/allure-commandline-2.24.0.tgz
            tar -xzf allure-commandline-2.24.0.tgz
            echo "$PWD/allure-2.24.0/bin" >> $GITHUB_PATH
        - name: Verify Allure installation
          run: |
            which allure || echo "Allure not in PATH"
            allure --version || echo "Allure not working"
        - name: Verify Pytest
          run: python -m pytest --version
        - name: Debug project structure
          run: |
            cd tutorial_ninja
            pwd
            ls -R
        - name: Repo Health Check
          run: |
            echo "ROOT STRUCTURE:"
            ls -la
            echo "TUTORIAL_NINJA STRUCTURE:"
            ls -la tutorial_ninja || echo "tutorial_ninja missing"
        - name: Inspect repo structure
          run: |
            cd tutorial_ninja
            echo "CURRENT DIR:"
            pwd
            echo "LEVEL 1:"
            ls -la
            echo "LEVEL 2:"
            find . -maxdepth 2 -type d    
        - name: Show real structure
          run: |
            echo "ROOT:"
            ls -la
            echo "----"
            cd tutorial_ninja
            echo "INSIDE tutorial_ninja:"
            ls -la
            echo "---- TREE ----"
            find . -maxdepth 3 -type d
        - name: Test import manually
          run: |
           cd tutorial_ninja
            python -c "import page_objects; print('IMPORT SUCCESS')"
        - name: DEBUG EVERYTHING
          run: |
            echo "---- CURRENT DIR ----"
            pwd
            echo "---- FILES ----"
            ls -R
            echo "---- REQUIREMENTS CONTENT ----"
            cat requirements.txt || echo "requirements.txt NOT FOUND"
            echo "---- INSTALLING ----"
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
            echo "---- INSTALLED PACKAGES ----"
            python -m pip list
            echo "---- CHECK PYTEST ----"
            python -m pip show pytest || echo "pytest NOT installed"
        - name: Set PYTHONPATH
          run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV
        - name: Run tests
          run: |
            cd tutorial_ninja
            pytest -n 4 --alluredir=allure-results || true
        
        - name: Validate allure results
          run: |
            if [ -d "tutorial_ninja/allure-results" ] && [ "$(ls -A tutorial_ninja/allure-results)" ]; then
              echo "Results exist"
            else
              echo "No results generated" && exit 1
            fi
        - name: Generate allure report
          run: |
            allure generate tutorial_ninja/allure-results \
            -o tutorial_ninja/allure-report --clean
        - name: Debug report artifacts
          run: |
            echo "---- ROOT ----"
            ls -la

            echo "---- tutorial_ninja ----"
            ls -la tutorial_ninja || echo "missing folder"

            echo "---- search zip ----"
            find . -name "*.zip"
        - name: Ensure allure report exists
          run: |
            if [ -d "tutorial_ninja/allure-report" ] && [ "$(ls -A tutorial_ninja/allure-report)" ]; then
              echo "Report ready"
            else
              echo "Report missing" && exit 1
            fi
        - name: Zip report
          run: |
            if [ -d "tutorial_ninja/allure-report" ]; then
              zip -r allure-report.zip tutorial_ninja/allure-report
            else
              echo "allure-report folder missing" && exit 1
            fi
        - name: Upload report to S3
          if: always()
          run: |
            aws s3 cp allure-report.zip \
              s3://allure-pytest-report-969578072631-ap-south-2-an/reports/run-${{ github.run_number }}.zip
        - name: Upload report
          run: |
            aws s3 cp allure-report.zip s3://allure-pytest-report-969578072631-ap-south-2-an/reports/latest.zip